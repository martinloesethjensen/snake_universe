name: Deploy snake_backend to Globe

on:
  push:
    branches:
      - main
    paths:
      - "snake_backend/**"
      - "packages/shared_models/**"
      - "pubspec.yaml"
      - "pubspec.lock"

jobs:
  deploy:
    name: Deploy to Globe (production)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install Globe CLI
        run: dart pub global activate globe_cli

      - name: Resolve workspace dependencies
        run: dart pub get

      - name: Deploy
        working-directory: snake_backend
        run: globe deploy --prod --token ${{ secrets.GLOBE_TOKEN }}
