name: snake_game
description: A retro 8-bit snake game built with Flutter and Flame.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  # The core game engine
  flame: ^1.35.1

  # For 8-bit styled text/UI
  google_fonts: ^6.1.0

  http: ^1.2.0
  shared_models: any
  supabase_flutter: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - fonts/PressStart2P-Regular.ttf
  fonts:
    - family: PressStart2P
      fonts:
        - asset: fonts/PressStart2P-Regular.ttf

flutter_native_splash:
  # Black background matching the app's retro style.
  color: "#000000"
  color_dark: "#000000"

  # Centred snake icon — same asset used for the app icon.
  image: assets/icons/icon_dark.png
  image_dark: assets/icons/icon_dark.png

  # Control which platforms are generated.
  android: true
  ios: true
  web: false

  # Android 12+ adaptive splash icon.
  android_12:
    image: assets/icons/icon_dark.png
    image_dark: assets/icons/icon_dark.png
    icon_background_color: "#000000"
    icon_background_color_dark: "#000000"
