name: snake_game
description: A retro 8-bit snake game built with Flutter and Flame.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # The core game engine
  flame: ^1.35.1

  # For 8-bit styled text/UI
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # If you decide to use 8-bit sprites or sound effects later,
  # you'll need to uncomment these:
  # assets:
  #   - assets/images/
  #   - assets/audio/
